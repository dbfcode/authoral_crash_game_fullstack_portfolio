services:
  postgres:
    image: postgres:18.3-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: crash
      POSTGRES_PASSWORD: crash
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql
      - ./docker/postgres/init-wallets-schema.sql:/docker-entrypoint-initdb.d/02-init-wallets-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crash"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: crash
      RABBITMQ_DEFAULT_PASS: crash
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HTTP_PORT: 8080
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    command: start-dev --import-realm
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  kong:
    image: kong:3.9.1
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    volumes:
      - ./docker/kong/kong.yml:/etc/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  game-service:
    build:
      context: .
      dockerfile: services/games/Dockerfile
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      GAMES_PORT: 4001
      GAMES_DB_URL: postgresql://crash:crash@postgres:5432/games
      RABBITMQ_URL: amqp://crash:crash@rabbitmq:5672
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: crash-game
      KEYCLOAK_CLIENT_ID: crash-game-client
      KEYCLOAK_ISSUER: http://localhost:8080/realms/crash-game
      AUTH_DEV_BYPASS: "0"
      GAMES_BETTING_DURATION_MS: "7000"
      GAMES_MAX_CRASH_MULTIPLIER: "1000.00"
    restart: unless-stopped

  wallet-service:
    build:
      context: .
      dockerfile: services/wallets/Dockerfile
    ports:
      - "4002:4002"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      WALLETS_PORT: 4002
      WALLETS_DB_URL: postgresql://crash:crash@postgres:5432/wallets
      RABBITMQ_URL: amqp://crash:crash@rabbitmq:5672
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: crash-game
      KEYCLOAK_CLIENT_ID: crash-game-client
      KEYCLOAK_ISSUER: http://localhost:8080/realms/crash-game
      AUTH_DEV_BYPASS: "0"
      WALLETS_INITIAL_BALANCE_CENTS: "500000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE: http://localhost:8000
        VITE_WS_URL: http://localhost:4001
        VITE_KEYCLOAK_URL: http://localhost:8080
        VITE_KEYCLOAK_REALM: crash-game
        VITE_KEYCLOAK_CLIENT_ID: crash-game-client
        VITE_BETTING_DURATION_MS: "7000"
    ports:
      - "3000:3000"
    depends_on:
      - game-service
      - keycloak
      - kong

volumes:
  postgres-data:
