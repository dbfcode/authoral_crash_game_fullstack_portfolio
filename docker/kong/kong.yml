_format_version: "3.0"

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      credentials: true
      max_age: 3600
      preflight_continue: false

services:
  - name: game-service
    url: http://game-service:4001
    routes:
      - name: game-routes
        paths:
          - /games
        strip_path: false
  - name: wallet-service
    url: http://wallet-service:4002
    routes:
      - name: wallet-routes
        paths:
          - /wallets
        strip_path: false
